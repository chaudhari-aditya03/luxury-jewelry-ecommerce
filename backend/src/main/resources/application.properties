# =====================================================
# SERVER CONFIGURATION
# =====================================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024
spring.application.name=${APP_NAME:jewelry-ecommerce}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =====================================================
# DATABASE CONFIGURATION
# =====================================================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/jewelry_ecommerce?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:aditya}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# =====================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# =====================================================
# JWT CONFIGURATION
# =====================================================
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=86400000

# =====================================================
# RAZORPAY CONFIGURATION
# =====================================================
razorpay.key.id=${RAZORPAY_KEY_ID:your_razorpay_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your_razorpay_key_secret}

# =====================================================
# FILE UPLOAD CONFIGURATION
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}
file.upload.dir=${FILE_UPLOAD_DIR:uploads}

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging.level.com.jewelryshop=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# =====================================================
# SWAGGER / OPENAPI CONFIGURATION
# =====================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# =====================================================
# CORS CONFIGURATION
# =====================================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=true

# =====================================================
# MAIL CONFIGURATION (configure with your SMTP provider)
# =====================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# =====================================================
# APP CONFIGURATION
# =====================================================
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# =====================================================
# DIRECT PAYMENT CONFIGURATION
# =====================================================
payment.upi.id=${PAYMENT_UPI_ID:adityachaudhari312005@oksbi}
payment.upi.payee-name=${PAYMENT_UPI_PAYEE_NAME:Jewelry Shop}

# =====================================================
# PAGINATION DEFAULTS
# =====================================================
pagination.default.page=0
pagination.default.size=10
pagination.max.size=100
