# =====================================================
# DEVELOPMENT ENVIRONMENT CONFIGURATION
# =====================================================

# =====================================================
# DATABASE CONFIGURATION (Development)
# =====================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=10

# =====================================================
# JPA / HIBERNATE (Development)
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# LOGGING (Development)
# =====================================================
logging.level.com.jewelryshop=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =====================================================
# JWT CONFIGURATION
# =====================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =====================================================
# RAZORPAY CONFIGURATION
# =====================================================
razorpay.key.id=${RAZORPAY_KEY_ID:your_dev_razorpay_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your_dev_razorpay_key_secret}

# =====================================================
# DIRECT PAYMENT CONFIGURATION
# =====================================================
payment.upi.id=${PAYMENT_UPI_ID}
payment.upi.payee-name=${PAYMENT_UPI_PAYEE_NAME}

# =====================================================
# FILE UPLOAD CONFIGURATION
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}

# =====================================================
# CORS CONFIGURATION
# =====================================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}


# =====================================================
# SWAGGER / OPENAPI
# =====================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
