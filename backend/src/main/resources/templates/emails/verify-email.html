<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email</title>
</head>
<body style="margin:0;padding:0;background:#f5f1ea;font-family:Arial,Helvetica,sans-serif;color:#2b2622;">
<div style="max-width:680px;margin:0 auto;padding:32px;">
    <div style="background:#1f1a17;color:#fff;border-radius:18px 18px 0 0;padding:28px 32px;">
        <div style="font-size:13px;letter-spacing:3px;text-transform:uppercase;opacity:0.75;" th:text="${brandName}">Jewelry Shop</div>
        <div style="font-size:28px;font-weight:700;margin-top:10px;">Verify your email</div>
    </div>
    <div style="background:#fff;padding:32px;border-radius:0 0 18px 18px;line-height:1.8;font-size:15px;">
        <p>Hi <strong th:text="${customerName}">Customer</strong>,</p>
        <p>Thank you for registering. Use the verification code below to activate your account.</p>
        <div style="margin:28px 0;padding:20px 24px;background:#f8f3ea;border:1px dashed #8b6b3e;border-radius:16px;text-align:center;">
            <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#8b6b3e;font-weight:700;">Your OTP</div>
            <div style="font-size:34px;font-weight:800;letter-spacing:8px;margin-top:8px;color:#1f1a17;" th:text="${verificationCode}">123456</div>
        </div>
        <p>Enter this code on the registration verification page. It expires in <span th:text="${validityMinutes}">5</span> minutes.</p>
        <p th:if="${expiryTime != null}">Expiry time: <strong th:text="${#temporals.format(expiryTime, 'hh:mm a, dd MMM yyyy')}">10:15 AM, 30 May 2026</strong></p>
    </div>
</div>
</body>
</html>
