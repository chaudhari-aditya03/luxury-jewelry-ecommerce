<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order shipped</title>
</head>
<body style="margin:0;padding:0;background:#f7f2eb;font-family:Arial,Helvetica,sans-serif;color:#241c17;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:linear-gradient(180deg,#f7f2eb 0%,#efe3d1 100%);padding:32px 16px;">
    <tr>
        <td align="center">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px;background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(36,28,23,0.12);">
                <tr>
                    <td style="background:linear-gradient(135deg,#154734 0%,#1f6a4f 55%,#7cae54 100%);padding:32px 36px;color:#f8fdf7;">
                        <div style="font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:0.75;" th:text="${brandName}">Luxury Maison</div>
                        <div style="font-size:32px;line-height:1.1;font-weight:800;margin-top:12px;">Your order has shipped</div>
                        <div style="margin-top:10px;font-size:15px;opacity:0.92;">Your jewelry is on the way and will arrive soon.</div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:36px;line-height:1.75;font-size:15px;">
                        <p style="margin:0 0 16px;">Hi <strong th:text="${customerName}">Customer</strong>,</p>
                        <p style="margin:0 0 20px;">Your order <strong th:text="${orderNumber}">ORD-00000000</strong> has been handed over to the delivery partner.</p>
                        <div style="margin:0 0 20px;padding:18px;border:1px solid #d8eadb;border-radius:18px;background:#f4fbf5;">
                            <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#5d7f62;margin-bottom:6px;">Delivery estimate</div>
                            <div style="font-size:18px;font-weight:800;" th:text="${estimatedDeliveryDate}">06 Jun 2026</div>
                        </div>
                        <div style="padding:18px;border-radius:18px;background:#faf4ea;border:1px solid #eadfcd;">
                            <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#7a6047;margin-bottom:6px;">Order status</div>
                            <div style="font-size:18px;font-weight:800;" th:text="${orderStatus}">SHIPPED</div>
                        </div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
