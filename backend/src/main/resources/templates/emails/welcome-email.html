<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
</head>
<body style="margin:0;padding:0;background:#f5f1ea;font-family:Arial,Helvetica,sans-serif;color:#2b2622;">
<div style="max-width:680px;margin:0 auto;padding:32px;">
    <div style="background:#1f1a17;color:#fff;border-radius:18px 18px 0 0;padding:28px 32px;">
        <div style="font-size:13px;letter-spacing:3px;text-transform:uppercase;opacity:0.75;" th:text="${brandName}">Jewelry Shop</div>
        <div style="font-size:28px;font-weight:700;margin-top:10px;">Welcome to our store</div>
    </div>
    <div style="background:#fff;padding:32px;border-radius:0 0 18px 18px;line-height:1.8;font-size:15px;">
        <p>Hi <strong th:text="${customerName}">Customer</strong>,</p>
        <p>Your account is ready. Explore our collection and discover curated jewelry pieces designed to last.</p>
        <p><a th:href="${frontendUrl}" th:text="${frontendUrl}">Visit the store</a></p>
    </div>
</div>
</body>
</html>
