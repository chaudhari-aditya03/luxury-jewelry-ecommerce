<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
</head>
<body style="margin:0;padding:0;background:#f5f1ea;font-family:Arial,Helvetica,sans-serif;color:#2b2622;">
<div style="max-width:680px;margin:0 auto;padding:32px;">
    <div style="background:#1f1a17;color:#fff;border-radius:18px 18px 0 0;padding:28px 32px;">
        <div style="font-size:13px;letter-spacing:3px;text-transform:uppercase;opacity:0.75;" th:text="${brandName}">Jewelry Shop</div>
        <div style="font-size:28px;font-weight:700;margin-top:10px;">Reset your password</div>
    </div>
    <div style="background:#fff;padding:32px;border-radius:0 0 18px 18px;line-height:1.8;font-size:15px;">
        <p>Hi <strong th:text="${customerName}">Customer</strong>,</p>
        <p>We received a password reset request for your account.</p>
        <p style="margin:28px 0;">
            <a th:href="${resetLink}" style="display:inline-block;background:#8b6b3e;color:#fff;text-decoration:none;padding:14px 24px;border-radius:999px;font-weight:700;">Reset Password</a>
        </p>
        <p>If you did not request this, you can ignore this email safely.</p>
    </div>
</div>
</body>
</html>
