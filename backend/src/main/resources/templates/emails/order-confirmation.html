<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmation</title>
</head>
<body style="margin:0;padding:0;background:#f5f1ea;font-family:Arial,Helvetica,sans-serif;color:#2b2622;">
<div style="max-width:680px;margin:0 auto;padding:32px;">
    <div style="background:#1f1a17;color:#fff;border-radius:18px 18px 0 0;padding:28px 32px;">
        <div style="font-size:13px;letter-spacing:3px;text-transform:uppercase;opacity:0.75;" th:text="${brandName}">Jewelry Shop</div>
        <div style="font-size:28px;font-weight:700;margin-top:10px;">Order confirmed</div>
    </div>
    <div style="background:#fff;padding:32px;border-radius:0 0 18px 18px;line-height:1.8;font-size:15px;">
        <p>Hi <strong th:text="${customerName}">Customer</strong>,</p>
        <p>Your order <strong th:text="${orderNumber}">ORD-00000000</strong> has been placed successfully.</p>
        <table width="100%" cellpadding="0" cellspacing="0" style="margin:24px 0;border-collapse:collapse;">
            <thead>
            <tr style="text-align:left;border-bottom:1px solid #eadfca;">
                <th style="padding:10px 0;">Product</th>
                <th style="padding:10px 0;">Qty</th>
                <th style="padding:10px 0;">Price</th>
                <th style="padding:10px 0;">Subtotal</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${order.orderItems}" style="border-bottom:1px solid #f0e6d8;">
                <td style="padding:10px 0;" th:text="${item.product.name}">Product</td>
                <td style="padding:10px 0;" th:text="${item.quantity}">1</td>
                <td style="padding:10px 0;">₹<span th:text="${item.price}">0.00</span></td>
                <td style="padding:10px 0;">₹<span th:text="${item.subtotal}">0.00</span></td>
            </tr>
            </tbody>
        </table>
        <p><strong>Total:</strong> ₹<span th:text="${finalAmount}">0.00</span></p>
        <p><strong>Discount:</strong> ₹<span th:text="${discountAmount}">0.00</span></p>
        <p th:if="${addressSnapshot != null}"><strong>Shipping Address:</strong> <span th:text="${addressSnapshot}">Address</span></p>
    </div>
</div>
</body>
</html>
